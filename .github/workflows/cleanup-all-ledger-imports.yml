name: Cleanup all ledger imports

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Delete all ledger import rows on Tencent Cloud
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 129.211.9.242
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e
            APP_DIR=/home/ubuntu/zhuge-ai-lab/pinzhiyanhuo
            cd "$APP_DIR"

            echo ">>> Backup data before cleanup"
            mkdir -p ~/backups/pinzhiyanhuo
            if [ -d data ]; then
              BACKUP=~/backups/pinzhiyanhuo/data-delete-all-ledger-imports-$(date +%Y%m%d-%H%M%S).tar.gz
              tar -czf "$BACKUP" data
              ls -lh "$BACKUP"
            fi

            echo ">>> Stop service before direct SQLite cleanup"
            pm2 stop pinzhiyanhuo || true

            cat > .cleanup-all-ledger-imports.mjs <<'NODE'
            import initSqlJs from 'sql.js';
            import { existsSync, readFileSync, writeFileSync } from 'node:fs';
            import path from 'node:path';

            const dbPath = path.join(process.cwd(), 'data', 'db.sqlite');
            if (!existsSync(dbPath)) {
              console.log(JSON.stringify({ error: 'db.sqlite not found', dbPath }));
              process.exit(1);
            }

            const SQL = await initSqlJs();
            const db = new SQL.Database(readFileSync(dbPath));
            const targetRows = [];
            const stmt = db.prepare('SELECT rowid, id, data FROM notices');
            while (stmt.step()) {
              const row = stmt.getAsObject();
              let data = {};
              try {
                data = JSON.parse(row.data || '{}');
              } catch {
                data = {};
              }
              const importSource = String(data.importSource || '').trim();
              if (!['summaryImport', 'ledgerImport'].includes(importSource)) continue;
              targetRows.push({
                rowid: row.rowid,
                id: String(row.id || data.id || ''),
                importSource,
                supplierShortName: data.supplierShortName || '',
                salesProductLine: data.salesProductLine || '',
                series: data.series || '',
                totalQuantity: data.totalQuantity || ''
              });
            }
            stmt.free();

            const targetRowids = [...new Set(targetRows.map((row) => row.rowid).filter(Boolean))];
            const targetIds = [...new Set(targetRows.map((row) => row.id).filter(Boolean))];

            db.run('BEGIN');
            const deleteNotice = db.prepare('DELETE FROM notices WHERE rowid = ?');
            const deleteSchedule = db.prepare('DELETE FROM schedules WHERE id = ?');
            const deleteReport = db.prepare('DELETE FROM reports WHERE id = ?');
            const deleteFeedback = db.prepare('DELETE FROM feedback WHERE id = ?');
            targetRowids.forEach((rowid) => {
              deleteNotice.bind([rowid]);
              deleteNotice.step();
              deleteNotice.reset();
            });
            targetIds.forEach((id) => {
              [deleteSchedule, deleteReport, deleteFeedback].forEach((statement) => {
                statement.bind([id]);
                statement.step();
                statement.reset();
              });
            });
            [deleteNotice, deleteSchedule, deleteReport, deleteFeedback].forEach((statement) => statement.free());
            db.run('COMMIT');

            if (targetRowids.length || targetIds.length) {
              writeFileSync(dbPath, Buffer.from(db.export()));
            }

            const verify = [];
            const verifyStmt = db.prepare('SELECT rowid, id, data FROM notices');
            while (verifyStmt.step()) {
              const row = verifyStmt.getAsObject();
              let data = {};
              try {
                data = JSON.parse(row.data || '{}');
              } catch {
                data = {};
              }
              if (['summaryImport', 'ledgerImport'].includes(String(data.importSource || '').trim())) {
                verify.push(row.id || data.id || '');
              }
            }
            verifyStmt.free();

            console.log(JSON.stringify({
              deletedNoticeRows: targetRowids.length,
              deletedChildIds: targetIds.length,
              remainingImportRows: verify.length,
              deletedSample: targetRows.slice(0, 10)
            }, null, 2));
            NODE

            echo ">>> Run cleanup"
            node .cleanup-all-ledger-imports.mjs
            rm -f .cleanup-all-ledger-imports.mjs

            echo ">>> Restart service"
            ADMIN_PASSWORD='${{ secrets.ADMIN_PASSWORD }}' \
            DINGTALK_WEBHOOK='${{ secrets.DINGTALK_WEBHOOK }}' \
            DINGTALK_SECRET='${{ secrets.DINGTALK_SECRET }}' \
            pm2 restart pinzhiyanhuo --update-env
            pm2 save
            pm2 list
