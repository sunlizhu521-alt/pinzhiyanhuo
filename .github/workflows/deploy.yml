name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 129.211.9.242
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/ubuntu/zhuge-ai-lab/pinzhiyanhuo

            echo ">>> Fetch latest code"
            for attempt in 1 2 3; do
              if git -c http.version=HTTP/1.1 fetch origin main; then
                break
              fi
              if [ "$attempt" = "3" ]; then
                echo "git fetch failed after 3 attempts"
                exit 1
              fi
              echo "git fetch failed, retrying in 10 seconds..."
              sleep 10
            done
            git reset --hard origin/main
            git log -1 --oneline

            echo ">>> Install dependencies"
            rm -rf dist
            npm ci --production=false

            echo ">>> Backup data"
            npm run backup

            echo ">>> Build frontend"
            npm run build

            echo ">>> Restart service"
            ADMIN_PASSWORD='${{ secrets.ADMIN_PASSWORD }}' pm2 restart pinzhiyanhuo --update-env
            pm2 save
            pm2 list

            echo ">>> Verify deployed assets"
            curl -s http://127.0.0.1:4002/ | grep -o 'assets/index-[^"]*\.js' || true
            cat dist/index.html | grep -o 'assets/index-[^"]*\.js' || true

            echo ">>> Deploy complete"
