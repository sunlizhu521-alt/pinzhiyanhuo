name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Pack source
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='data' \
            --exclude='backups' \
            --exclude='dist' \
            -czf /tmp/pinzhiyanhuo-release.tgz .
          cp /tmp/pinzhiyanhuo-release.tgz pinzhiyanhuo-release.tgz

      - name: Upload source package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 129.211.9.242
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: pinzhiyanhuo-release.tgz
          target: /home/ubuntu/zhuge-ai-lab

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 129.211.9.242
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e
            APP_DIR=/home/ubuntu/zhuge-ai-lab/pinzhiyanhuo
            RELEASE=/home/ubuntu/zhuge-ai-lab/pinzhiyanhuo-release.tgz
            RELEASE_DIR=/home/ubuntu/zhuge-ai-lab/pinzhiyanhuo-release

            echo ">>> Pre-deploy service state"
            pm2 describe pinzhiyanhuo || true
            pm2 logs pinzhiyanhuo --lines 120 --nostream || true
            curl -fsS --max-time 5 http://127.0.0.1:4002/api/health || true

            echo ">>> Backup data before replacing code"
            cd "$APP_DIR"
            npm run backup

            echo ">>> Unpack latest code"
            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            tar -xzf "$RELEASE" -C "$RELEASE_DIR"
            if command -v rsync >/dev/null 2>&1; then
              rsync -a --delete \
                --exclude='.git' \
                --exclude='node_modules' \
                --exclude='data' \
                --exclude='backups' \
                --exclude='.env' \
                "$RELEASE_DIR"/ "$APP_DIR"/
            else
              cp -a "$RELEASE_DIR"/. "$APP_DIR"/
            fi
            rm -rf "$RELEASE_DIR" "$RELEASE"

            cd "$APP_DIR"
            echo "Release package unpacked"

            echo ">>> Install dependencies"
            rm -rf dist
            npm ci --production=false

            echo ">>> Build frontend"
            npm run build

            echo ">>> Restart service"
            export ADMIN_PASSWORD='${{ secrets.ADMIN_PASSWORD }}'
            export DINGTALK_WEBHOOK='${{ secrets.DINGTALK_WEBHOOK }}'
            export DINGTALK_SECRET='${{ secrets.DINGTALK_SECRET }}'
            if pm2 describe pinzhiyanhuo >/dev/null 2>&1; then
              pm2 restart pinzhiyanhuo --update-env
            else
              pm2 start ecosystem.config.cjs --update-env
            fi
            pm2 save
            pm2 list

            echo ">>> Wait for service health"
            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:4002/api/health >/dev/null; then
                echo "Service health check passed"
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Service health check failed"
                pm2 logs pinzhiyanhuo --lines 80 --nostream
                exit 1
              fi
              sleep 1
            done

            echo ">>> Verify deployed assets"
            curl -s http://127.0.0.1:4002/ | grep -o 'assets/index-[^"]*\.js' || true
            cat dist/index.html | grep -o 'assets/index-[^"]*\.js' || true

            echo ">>> Deploy complete"
