name: Cleanup keep latest ledger import

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Keep only latest ledger import batch on Tencent Cloud
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 129.211.9.242
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e
            APP_DIR=/home/ubuntu/zhuge-ai-lab/pinzhiyanhuo
            cd "$APP_DIR"

            echo ">>> Backup data before cleanup"
            mkdir -p ~/backups/pinzhiyanhuo
            if [ -d data ]; then
              BACKUP=~/backups/pinzhiyanhuo/data-keep-latest-ledger-import-$(date +%Y%m%d-%H%M%S).tar.gz
              tar -czf "$BACKUP" data
              ls -lh "$BACKUP"
            fi

            echo ">>> Stop service before direct SQLite cleanup"
            pm2 stop pinzhiyanhuo || true

            cat > .cleanup-keep-latest-ledger-import.mjs <<'NODE'
            import initSqlJs from 'sql.js';
            import { existsSync, readFileSync, writeFileSync } from 'node:fs';
            import path from 'node:path';

            const dbPath = path.join(process.cwd(), 'data', 'db.sqlite');
            if (!existsSync(dbPath)) {
              console.log(JSON.stringify({ error: 'db.sqlite not found', dbPath }));
              process.exit(1);
            }

            const SQL = await initSqlJs();
            const db = new SQL.Database(readFileSync(dbPath));
            const rows = [];
            const stmt = db.prepare('SELECT rowid, id, data FROM notices');
            while (stmt.step()) {
              const row = stmt.getAsObject();
              let data = {};
              try {
                data = JSON.parse(row.data || '{}');
              } catch {
                data = {};
              }
              const importSource = String(data.importSource || '').trim();
              if (!['summaryImport', 'ledgerImport'].includes(importSource)) continue;
              const id = String(row.id || data.id || '');
              const timestamp = Number((id.match(/^(\d{13})-/) || [])[1] || 0);
              rows.push({
                rowid: row.rowid,
                id,
                timestamp,
                importSource,
                supplierShortName: data.supplierShortName || '',
                salesProductLine: data.salesProductLine || '',
                series: data.series || '',
                totalQuantity: data.totalQuantity || ''
              });
            }
            stmt.free();

            const timestamped = rows
              .filter((row) => row.id && row.timestamp > 0)
              .sort((a, b) => a.timestamp - b.timestamp);
            const gaps = timestamped.slice(1).map((row, index) => ({
              previousId: timestamped[index].id,
              currentId: row.id,
              previousTimestamp: timestamped[index].timestamp,
              currentTimestamp: row.timestamp,
              gapMs: row.timestamp - timestamped[index].timestamp
            }));
            const batchGapMs = 1000;
            const batches = [];
            for (const row of timestamped) {
              const lastBatch = batches[batches.length - 1];
              if (!lastBatch || row.timestamp - lastBatch.maxTimestamp > batchGapMs) {
                batches.push({
                  minTimestamp: row.timestamp,
                  maxTimestamp: row.timestamp,
                  rows: [row]
                });
              } else {
                lastBatch.rows.push(row);
                lastBatch.maxTimestamp = Math.max(lastBatch.maxTimestamp, row.timestamp);
              }
            }
            const keepBatch = batches[batches.length - 1] || null;
            const keepRows = keepBatch?.rows || [];
            const keepIds = new Set(keepRows.map((row) => row.id));
            const keepRowidById = new Map();
            keepRows.forEach((row) => {
              if (!row.id) return;
              const current = keepRowidById.get(row.id);
              if (!current || row.rowid > current) keepRowidById.set(row.id, row.rowid);
            });
            const deleteRows = rows.filter((row) => {
              if (!row.id) return false;
              if (row.timestamp <= 0) return false;
              if (!keepIds.has(row.id)) return true;
              return keepRowidById.get(row.id) !== row.rowid;
            });
            const deleteNoticeRowids = [...new Set(deleteRows.map((row) => row.rowid).filter(Boolean))];
            const deleteChildIds = [...new Set(deleteRows
              .filter((row) => !keepIds.has(row.id))
              .map((row) => row.id)
              .filter(Boolean))];

            db.run('BEGIN');
            const deleteNotice = db.prepare('DELETE FROM notices WHERE rowid = ?');
            const deleteSchedule = db.prepare('DELETE FROM schedules WHERE id = ?');
            const deleteReport = db.prepare('DELETE FROM reports WHERE id = ?');
            const deleteFeedback = db.prepare('DELETE FROM feedback WHERE id = ?');
            deleteNoticeRowids.forEach((rowid) => {
              deleteNotice.bind([rowid]);
              deleteNotice.step();
              deleteNotice.reset();
            });
            deleteChildIds.forEach((id) => {
              [deleteSchedule, deleteReport, deleteFeedback].forEach((statement) => {
                statement.bind([id]);
                statement.step();
                statement.reset();
              });
            });
            [deleteNotice, deleteSchedule, deleteReport, deleteFeedback].forEach((statement) => statement.free());
            db.run('COMMIT');

            if (deleteNoticeRowids.length || deleteChildIds.length) {
              writeFileSync(dbPath, Buffer.from(db.export()));
            }

            const uniqueImportIdsBefore = new Set(rows.map((row) => row.id).filter(Boolean)).size;
            const keptNoticeRows = keepRowidById.size;
            console.log(JSON.stringify({
              importRowsBefore: rows.length,
              uniqueImportIdsBefore,
              timestampedRowsBefore: timestamped.length,
              batchGapMs,
              largestGaps: gaps
                .sort((a, b) => b.gapMs - a.gapMs)
                .slice(0, 20),
              batchCount: batches.length,
              batches: batches.map((batch, index) => ({
                index: index + 1,
                count: batch.rows.length,
                minTimestamp: batch.minTimestamp,
                maxTimestamp: batch.maxTimestamp,
                sample: batch.rows.slice(0, 3)
              })),
              keptLatestBatch: keepBatch ? {
                count: keepBatch.rows.length,
                uniqueIds: keepRowidById.size,
                minTimestamp: keepBatch.minTimestamp,
                maxTimestamp: keepBatch.maxTimestamp,
                sample: keepBatch.rows.slice(0, 5)
              } : null,
              keptNoticeRows,
              deletedNoticeRows: deleteNoticeRowids.length,
              deletedOlderChildIds: deleteChildIds.length,
              duplicateNoticeRowsRemoved: deleteRows.filter((row) => keepIds.has(row.id)).length,
              deletedOlderRows: deleteRows.filter((row) => !keepIds.has(row.id)).length,
              deletedSample: deleteRows.slice(0, 10)
            }, null, 2));
            NODE

            echo ">>> Run cleanup"
            node .cleanup-keep-latest-ledger-import.mjs
            rm -f .cleanup-keep-latest-ledger-import.mjs

            echo ">>> Restart service"
            ADMIN_PASSWORD='${{ secrets.ADMIN_PASSWORD }}' \
            DINGTALK_WEBHOOK='${{ secrets.DINGTALK_WEBHOOK }}' \
            DINGTALK_SECRET='${{ secrets.DINGTALK_SECRET }}' \
            pm2 restart pinzhiyanhuo --update-env
            pm2 save
            pm2 list
